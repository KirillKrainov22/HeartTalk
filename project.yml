name: HeartTalk
options:
  bundleIdPrefix: com.kirillkraynov
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""

targets:
  HeartTalk:
    type: application
    platform: iOS
    sources:
      - path: HeartTalk
        excludes:
          - "**/.DS_Store"
    resources:
      - path: HeartTalk/Resources/Assets.xcassets
      - path: HeartTalk/Resources/questions.json
      - path: HeartTalk/Resources/NLP.mlmodel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kirillkraynov.HeartTalk
        INFOPLIST_FILE: HeartTalk/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: HeartTalk
        GENERATE_INFOPLIST_FILE: false
        COREML_CODEGEN_LANGUAGE: Swift
    dependencies: []

  HeartTalkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HeartTalkTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: HeartTalk
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kirillkraynov.HeartTalkTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HeartTalk.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HeartTalk"
        SWIFT_VERSION: "5.9"

  HeartTalkUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HeartTalkUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: HeartTalk
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kirillkraynov.HeartTalkUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: HeartTalk
        SWIFT_VERSION: "5.9"

schemes:
  HeartTalk:
    build:
      targets:
        HeartTalk: all
        HeartTalkTests: [test]
        HeartTalkUITests: [test]
    test:
      targets:
        - HeartTalkTests
        - HeartTalkUITests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
